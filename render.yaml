services:
  - type: web
    name: adaptie-diagnostic
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_NAME
        value: adaptive_diagnostic
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11
